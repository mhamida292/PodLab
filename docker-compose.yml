services:
  podlab:
    build: .
    image: podlab:latest
    container_name: podlab
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=9090
      # Podcast state (subscriptions + playback) persists to ./data/state.json.
      # Add or remove podcasts at runtime in the app UI — no rebuild needed.
