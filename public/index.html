<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14161b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PodLab" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <script>
    // Pre-paint: apply persisted/auto theme to <html> before CSS loads (no flash).
    (function () {
      try {
        var pref = localStorage.getItem("podlab.theme") || "auto";
        var dark = pref === "dark" || (pref !== "light" &&
          matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", dark ? "#14161b" : "#ffffff");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <link rel="stylesheet" href="/styles.css" />
  <title>PodLab</title>
</head>
<body>
  <header class="topbar">
    <button id="backBtn" class="back hidden" aria-label="Back">‹</button>
    <h1 id="title">PodLab</h1>
    <button id="refreshBtn" class="icon-btn" aria-label="Refresh">⟳</button>
  </header>

  <main id="view" class="view">
    <div id="home-extras" class="home-extras hidden">
      <input id="search" class="search" type="search" placeholder="Search podcasts, series, episodes…" />
      <div id="continue" class="continue hidden"></div>
    </div>
    <div id="list"><div class="loading">Loading…</div></div>
  </main>

  <!-- Persistent mini player -->
  <footer id="player" class="player hidden">
    <div class="player-meta">
      <div id="pTitle" class="p-title">Nothing playing</div>
      <div id="pSeries" class="p-series"></div>
    </div>
    <div class="player-controls">
      <button id="back15" class="ctl" aria-label="Back 15s">⟲15</button>
      <button id="playPause" class="ctl play" aria-label="Play/Pause">▶</button>
      <button id="fwd30" class="ctl" aria-label="Forward 30s">30⟳</button>
    </div>
    <div class="seek">
      <span id="cur" class="t">0:00</span>
      <input id="scrub" class="scrub" type="range" min="0" max="100" value="0" step="0.1" />
      <span id="dur" class="t">0:00</span>
    </div>
    <audio id="audio" preload="metadata"></audio>
  </footer>

  <script src="/app.js" type="module"></script>
</body>
</html>
